name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency: deploy-glluga-law-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        # --depot=false: app-scope deploy token으로는 org-scope depot builder에 접근 불가.
        # legacy remote builder로 fallback (app-scope라 deploy token 권한 범위 내).
        run: flyctl deploy --remote-only --depot=false --config fly.glluga.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
